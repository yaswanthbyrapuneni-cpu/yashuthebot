services:
  - type: web
    name: alankara-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_PHONE
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: VITE_KIOSK_ID
        value: KIOSK_001
      - key: VERTEX_PROJECT_ID
        sync: false
      - key: VERTEX_REGION
        value: us-central1
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
